---
name: 🆕 Renovate
"on":
  workflow_dispatch:
  schedule:
    - cron: "3 17 * * 1"
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - renovate.json5

jobs:

  renovate:
    uses: kdeldycke/repomatic/.github/workflows/renovate.yaml@dd9067f15dfe8e1f2a4698d203ffc3a404155c89 # v6.22.0
    secrets:
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
