[tool.repomatic]
exclude = [
    "changelog",
    "codecov",
    "workflows/changelog.yaml",
    "workflows/debug.yaml",
    "workflows/release.yaml",
]
gitignore_location = "./dotfiles/.gitignore_global"
skills.location = "./dotfiles/.claude/skills/"
gitignore_extra_categories = [
    "archive",
    "archives",
    "backup",
    "bittorrent",
    "compressed",
    "compressedarchive",
    "compression",
    "database",
    "datarecovery",
    "executable",
    "games",
    "jupyternotebooks",
    "less",
    "libreoffice",
    "microsoftoffice",
]

[tool.ruff]
# Broken symlink on CI: target only exists on the local macOS machine.
extend-exclude = [
    "dotfiles/Library/Application Support/SwiftBar/",
]

[tool.biome.formatter]
indentStyle = "space"
indentWidth = 2

[tool.gitleaks.allowlist]
description = "False positives"
commits = [
    # A simple Twitter URL.
    # https://github.com/kdeldycke/dotfiles/commit/76a09e4314b791077c7a0c95ccb1a55d7dbf5ab2
    "76a09e4314b791077c7a0c95ccb1a55d7dbf5ab2",
    # Service account credential for GCP that was properly anonymized.
    # https://github.com/kdeldycke/dotfiles/commit/a1e242d19d7d5cb0acf8ee81cfe98b21b6bdfb77
    "a1e242d19d7d5cb0acf8ee81cfe98b21b6bdfb77",
    # Dummy API_KEY="abcdef123456" example in BitBar plugin.
    # https://github.com/kdeldycke/dotfiles/commit/49d09fd0f65b7a7a6c382272fc6819f0ead2a76c
    "49d09fd0f65b7a7a6c382272fc6819f0ead2a76c",
]

[tool.typos]
# Exclude terminal config.
files.extend-exclude = [
    "assets/Monokai Soda.terminal",
]
